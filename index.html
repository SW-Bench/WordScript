<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordScript</title>
    <!-- Prevent FOUC on dark windows -->
    <style>html, body { background: transparent; margin: 0; padding: 0; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (window.location.hash.startsWith("#/overlay") || window.location.hash === "") {
        document.documentElement.classList.add("overlay-window", "overlay-idle");
        document.body.classList.add("overlay-window", "overlay-idle");
        document.getElementById("root")?.classList.add("overlay-window", "overlay-idle");
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
